<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Formulário de pedidos da Docinhos da Ari."
  >
  <title>Docinhos da Ari | Pedido</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="page-shell">
    <section class="order-panel" aria-labelledby="titulo-pedido">
      <header class="brand-header">
        <div class="brand-logo-frame" aria-label="Docinhos da Ari">
          <img class="brand-logo" src="assets/docinho-logo.png" alt="">
          <span class="brand-logo-fallback" aria-hidden="true">DA</span>
        </div>
        <div class="brand-photo-frame">
          <img
            class="brand-photo"
            src="assets/docinhos-sortidos.jpg"
            alt="Trufas e docinhos de chocolate da Docinhos da Ari"
          >
        </div>

        <div class="brand-copy">
          <p class="eyebrow">Docinhos da Ari</p>
          <h1 id="titulo-pedido">Faça seu pedido</h1>
          <p>Preencha os dados abaixo para registrar sua encomenda.</p>
        </div>
      </header>

      <form
        class="order-form"
        id="pedidoForm"
        action="https://formsubmit.co/vinicios3007@gmail.com"
        method="POST"
        novalidate
      >
        <input type="hidden" name="_subject" value="Novo pedido - Docinhos da Ari">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">

        <div class="form-grid">
          <div class="field">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              autocomplete="name"
              minlength="3"
              required
            >
          </div>

          <div class="field">
            <label for="idade">Idade</label>
            <input
              type="number"
              id="idade"
              name="idade"
              inputmode="numeric"
              min="1"
              max="120"
              required
            >
          </div>

          <div class="field">
            <label for="cpf">CPF</label>
            <input
              type="text"
              id="cpf"
              name="cpf"
              autocomplete="off"
              inputmode="numeric"
              placeholder="000.000.000-00"
              pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
              maxlength="14"
              required
            >
          </div>

          <div class="field">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              autocomplete="tel"
              inputmode="tel"
              placeholder="(00) 00000-0000"
              maxlength="15"
              required
            >
          </div>

          <div class="field">
            <label for="cep">CEP</label>
            <input
              type="text"
              id="cep"
              name="cep"
              autocomplete="postal-code"
              inputmode="numeric"
              placeholder="00000-000"
              maxlength="9"
              required
            >
            <span class="field-help" id="cepStatus" role="status" aria-live="polite"></span>
          </div>

          <div class="field field-full">
            <label for="rua">Rua</label>
            <input
              type="text"
              id="rua"
              name="rua"
              autocomplete="address-line1"
              required
            >
          </div>

          <div class="field">
            <label for="bairro">Bairro</label>
            <input
              type="text"
              id="bairro"
              name="bairro"
              autocomplete="address-level3"
              required
            >
          </div>

          <div class="field">
            <label for="numero">Número da casa</label>
            <input
              type="text"
              id="numero"
              name="numero"
              autocomplete="address-line2"
              required
            >
          </div>

          <div class="field field-full">
            <label for="complemento">Complemento</label>
            <input
              type="text"
              id="complemento"
              name="complemento"
              autocomplete="address-line3"
              placeholder="Apartamento, bloco ou referência"
            >
          </div>

          <div class="field field-full">
            <label for="sabores">Sabores desejados</label>
            <select
              id="sabores"
              name="sabores"
              required
            >
              <option value="">Selecione um sabor</option>
              <option value="Brigadeiro">Brigadeiro - R$ 6,00</option>
              <option value="Beijinho">Beijinho - R$ 6,00</option>
              <option value="Casadinho">Casadinho - R$ 6,00</option>
              <option value="Chocolate">Chocolate - R$ 6,00</option>
              <option value="Coco">Coco - R$ 6,00</option>
              <option value="Morango">Morango - R$ 6,00</option>
              <option value="Ninho">Ninho - R$ 6,00</option>
              <option value="Ninho com Nutella">Ninho com Nutella - R$ 6,00</option>
              <option value="Sortido">Sortido - R$ 6,00</option>
            </select>
            <span class="field-help">Todos os sabores custam R$ 6,00 cada.</span>
          </div>

          <div class="field">
            <label for="quantidade">Quantidade</label>
            <input
              type="number"
              id="quantidade"
              name="quantidade"
              inputmode="numeric"
              min="1"
              required
            >
          </div>
        </div>

        <button class="submit-button" type="submit">Realizar pedido</button>
        <p class="form-message" id="mensagem" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <div class="payment-modal" id="pagamentoPix" role="dialog" aria-modal="true" aria-labelledby="pagamentoTitulo" hidden>
    <div class="payment-modal__content">
      <p class="payment-modal__eyebrow">Pagamento Pix</p>
      <h2 id="pagamentoTitulo">Finalize o pagamento para confirmar o pedido</h2>
      <p id="pagamentoResumo"></p>

      <div class="pix-box">
        <span class="pix-box__label">Chave Pix</span>
        <div class="pix-copy-row">
          <input
            class="pix-copy-row__input"
            id="pixChave"
            type="text"
            value="119806571119"
            aria-label="Chave Pix"
            readonly
          >
          <button class="payment-modal__secondary-button" id="copiarPix" type="button">Copiar chave</button>
        </div>
        <p class="payment-modal__status" id="pagamentoStatus" role="status" aria-live="polite"></p>
      </div>

      <button class="payment-modal__button" id="confirmarPagamento" type="button">Já fiz o pagamento</button>
      <button class="payment-modal__ghost-button" id="alterarPedido" type="button">Voltar e alterar pedido</button>
    </div>
  </div>

  <div class="success-modal" id="sucessoPedido" role="dialog" aria-modal="true" aria-labelledby="sucessoTitulo" hidden>
    <div class="success-modal__content">
      <p class="success-modal__eyebrow">Pedido confirmado</p>
      <h2 id="sucessoTitulo">Parabéns! Seu pedido foi realizado com sucesso.</h2>
      <p id="sucessoResumo"></p>
      <button class="success-modal__button" id="fecharSucesso" type="button">Fechar</button>
    </div>
  </div>
</body>
</html>
