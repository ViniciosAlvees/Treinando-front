<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Formulario de pedidos da Docinhos da Ari."
  >
  <title>Docinhos da Ari | Pedido</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="page-shell">
    <section class="order-panel" aria-labelledby="titulo-pedido">
      <header class="brand-header">
        <div class="brand-logo-frame" aria-label="Docinhos da Ari">
          <img class="brand-logo" src="logo.png" alt="">
          <span class="brand-logo-fallback" aria-hidden="true">DA</span>
        </div>
        <div class="brand-photo-frame">
          <img
            class="brand-photo"
            src="imagem.jpg"
            alt="Docinhos artesanais da Docinhos da Ari"
          >
        </div>

        <div class="brand-copy">
          <p class="eyebrow">Docinhos da Ari</p>
          <h1 id="titulo-pedido">Faca seu pedido</h1>
          <p>Preencha os dados abaixo para registrar sua encomenda.</p>
        </div>
      </header>

      <form class="order-form" id="pedidoForm" novalidate>
        <div class="form-grid">
          <div class="field">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              autocomplete="name"
              minlength="3"
              required
            >
          </div>

          <div class="field">
            <label for="idade">Idade</label>
            <input
              type="number"
              id="idade"
              name="idade"
              inputmode="numeric"
              min="1"
              max="120"
              required
            >
          </div>

          <div class="field">
            <label for="cpf">CPF</label>
            <input
              type="text"
              id="cpf"
              name="cpf"
              autocomplete="off"
              inputmode="numeric"
              placeholder="000.000.000-00"
              maxlength="14"
              required
            >
          </div>

          <div class="field">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              autocomplete="tel"
              inputmode="tel"
              placeholder="(00) 00000-0000"
              maxlength="15"
              required
            >
          </div>

          <div class="field field-full">
            <label for="endereco">Endereco de entrega</label>
            <input
              type="text"
              id="endereco"
              name="endereco"
              autocomplete="street-address"
              required
            >
          </div>

          <div class="field field-full">
            <label for="sabores">Sabores desejados</label>
            <input
              type="text"
              id="sabores"
              name="sabores"
              placeholder="Ex: chocolate, morango e ninho"
              required
            >
          </div>

          <div class="field">
            <label for="quantidade">Quantidade</label>
            <input
              type="number"
              id="quantidade"
              name="quantidade"
              inputmode="numeric"
              min="1"
              required
            >
          </div>
        </div>

        <button class="submit-button" type="submit">Realizar pedido</button>
        <p class="form-message" id="mensagem" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
</body>
</html>
