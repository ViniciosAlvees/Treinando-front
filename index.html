<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Formulario de pedidos da Docinhos da Ari."
  >
  <title>Docinhos da Ari | Pedido</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="page-shell">
    <section class="order-panel" aria-labelledby="titulo-pedido">
      <header class="brand-header">
        <div class="brand-logo-frame" aria-label="Docinhos da Ari">
          <img class="brand-logo" src="logo.png" alt="">
          <span class="brand-logo-fallback" aria-hidden="true">DA</span>
        </div>
        <div class="brand-photo-frame">
          <img
            class="brand-photo"
            src="imagem.jpg"
            alt="Docinhos artesanais da Docinhos da Ari"
          >
        </div>

        <div class="brand-copy">
          <p class="eyebrow">Docinhos da Ari</p>
          <h1 id="titulo-pedido">Faca seu pedido</h1>
          <p>Preencha os dados abaixo para registrar sua encomenda.</p>
        </div>
      </header>

      <form class="order-form" id="pedidoForm" novalidate>
        <div class="form-grid">
          <div class="field">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              autocomplete="name"
              minlength="3"
              required
            >
          </div>

          <div class="field">
            <label for="idade">Idade</label>
            <input
              type="number"
              id="idade"
              name="idade"
              inputmode="numeric"
              min="1"
              max="120"
              required
            >
          </div>

          <div class="field">
            <label for="cpf">CPF</label>
            <input
              type="text"
              id="cpf"
              name="cpf"
              autocomplete="off"
              inputmode="numeric"
              placeholder="000.000.000-00"
              pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
              maxlength="14"
              required
            >
          </div>

          <div class="field">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              autocomplete="tel"
              inputmode="tel"
              placeholder="(00) 00000-0000"
              maxlength="15"
              required
            >
          </div>

          <div class="field">
            <label for="cep">CEP</label>
            <input
              type="text"
              id="cep"
              name="cep"
              autocomplete="postal-code"
              inputmode="numeric"
              placeholder="00000-000"
              maxlength="9"
              required
            >
            <span class="field-help" id="cepStatus" role="status" aria-live="polite"></span>
          </div>

          <div class="field field-full">
            <label for="rua">Rua</label>
            <input
              type="text"
              id="rua"
              name="rua"
              autocomplete="address-line1"
              required
            >
          </div>

          <div class="field">
            <label for="bairro">Bairro</label>
            <input
              type="text"
              id="bairro"
              name="bairro"
              autocomplete="address-level3"
              required
            >
          </div>

          <div class="field">
            <label for="numero">Numero da casa</label>
            <input
              type="text"
              id="numero"
              name="numero"
              autocomplete="address-line2"
              required
            >
          </div>

          <div class="field field-full">
            <label for="complemento">Complemento</label>
            <input
              type="text"
              id="complemento"
              name="complemento"
              autocomplete="address-line3"
              placeholder="Apartamento, bloco ou referencia"
            >
          </div>

          <div class="field field-full">
            <label for="sabores">Sabores desejados</label>
            <select
              id="sabores"
              name="sabores"
              required
            >
              <option value="">Selecione um sabor</option>
              <option value="Brigadeiro">Brigadeiro</option>
              <option value="Beijinho">Beijinho</option>
              <option value="Casadinho">Casadinho</option>
              <option value="Chocolate">Chocolate</option>
              <option value="Coco">Coco</option>
              <option value="Morango">Morango</option>
              <option value="Ninho">Ninho</option>
              <option value="Ninho com Nutella">Ninho com Nutella</option>
              <option value="Sortido">Sortido</option>
            </select>
          </div>

          <div class="field">
            <label for="quantidade">Quantidade</label>
            <input
              type="number"
              id="quantidade"
              name="quantidade"
              inputmode="numeric"
              min="1"
              required
            >
          </div>
        </div>

        <button class="submit-button" type="submit">Realizar pedido</button>
        <p class="form-message" id="mensagem" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
</body>
</html>
